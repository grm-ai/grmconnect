# Stage 1 — HTTP only. Works immediately (http://your-domain or http://VPS-IP) and serves the
# Let's Encrypt challenge. After you obtain the SSL cert (see DEPLOY.md), replace this file with
# nginx/app-ssl.conf.example (edit the domain) to enable HTTPS.
server {
    listen 80;
    server_name _;          # matches any domain / the raw IP

    client_max_body_size 10m;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Backend API — strip the /api prefix (trailing slash on proxy_pass does this)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
